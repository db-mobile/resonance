<template id="tpl-mock-server-dialog">
    <div class="u-flex u-flex-col u-flex-1 u-min-h-0 u-overflow-hidden">
        <div class="dialog-header">
            <h3 class="dialog-title" data-role="title"></h3>
            <button id="mock-server-close-btn" class="dialog-close-btn" aria-label="Close">&times;</button>
        </div>

        <div class="mock-server-status-section">
            <div class="u-flex u-items-center u-gap-3">
                <span id="mock-server-status-indicator" class="mock-server-status-indicator">○</span>
                <span id="mock-server-status-text" class="mock-server-status-text" data-role="status-stopped"></span>
                <span id="mock-server-url" class="mock-server-url"></span>
            </div>
            <div class="mock-server-controls u-flex u-items-center u-gap-3">
                <button id="mock-server-toggle-btn" class="btn btn-primary mock-server-toggle-btn" data-role="start-server"></button>
                <label class="mock-server-port-label u-flex u-items-center u-gap-2">
                    <span data-role="port-label"></span>
                    <input type="number" id="mock-server-port-input" min="1024" max="65535" value="3000" class="input-base field-input mock-server-port-input" />
                </label>
            </div>
        </div>

        <div class="mock-server-main u-flex u-gap-4 u-flex-1 u-min-h-0 u-overflow-hidden">
            <div class="mock-server-column--collections u-flex u-flex-col u-flex-1 u-min-h-0 u-overflow-hidden">
                <h4 class="section-eyebrow mock-server-section-title" data-role="collections-heading"></h4>
                <div id="mock-server-collections" class="u-flex-1 u-overflow-y-auto"></div>
            </div>

            <div class="u-flex u-flex-col u-flex-1 u-min-h-0 u-overflow-hidden">
                <div class="mock-server-log-header u-flex u-items-center u-justify-between">
                    <h4 class="section-eyebrow mock-server-section-title" data-role="request-log-heading"></h4>
                    <button id="mock-server-clear-logs-btn" class="btn-xs btn-outline" data-role="clear"></button>
                </div>
                <div id="mock-server-logs" class="mock-server-logs u-flex-1 u-overflow-y-auto"></div>
            </div>
        </div>

        <div class="dialog-footer dialog-footer--divided">
            <button id="mock-server-close-btn-2" class="btn btn-outline" data-role="close"></button>
        </div>
    </div>
</template>

<template id="tpl-mock-server-empty-state">
    <div class="empty-state-base mock-server-empty-state" data-role="content"></div>
</template>

<template id="tpl-mock-server-logs-empty">
    <div class="empty-state-base mock-server-empty-state" data-role="content"></div>
</template>

<template id="tpl-mock-server-logs-table">
    <table class="mock-server-logs-table">
        <thead>
            <tr class="mock-server-logs-row">
                <th class="mock-server-logs-th" data-role="th-time"></th>
                <th class="mock-server-logs-th" data-role="th-method"></th>
                <th class="mock-server-logs-th" data-role="th-path"></th>
                <th class="mock-server-logs-th" data-role="th-status"></th>
                <th class="mock-server-logs-th mock-server-logs-th--right" data-role="th-time-ms"></th>
            </tr>
        </thead>
        <tbody data-role="tbody"></tbody>
    </table>
</template>

<template id="tpl-mock-server-logs-row">
    <tr class="mock-server-logs-row">
        <td class="mock-server-logs-td mock-server-logs-td--muted" data-role="time"></td>
        <td class="mock-server-logs-td">
            <span class="mock-server-logs-method" data-role="method"></span>
        </td>
        <td class="mock-server-logs-td mock-server-logs-path" data-role="path"></td>
        <td class="mock-server-logs-td">
            <span class="mock-server-logs-status" data-role="status"></span>
        </td>
        <td class="mock-server-logs-td mock-server-logs-td--muted mock-server-logs-td--right" data-role="time-ms"></td>
    </tr>
</template>

<template id="tpl-mock-server-response-editor">
    <div class="u-flex u-flex-col u-flex-1 u-min-h-0 u-overflow-hidden">
        <div class="dialog-header">
            <div>
                <h3 class="dialog-title" data-role="title"></h3>
                <p class="dialog-subtitle" data-role="subtitle"></p>
            </div>
            <button id="response-editor-close" class="dialog-close-btn" aria-label="Close">&times;</button>
        </div>

        <div class="mock-server-notice is-hidden" data-role="custom-notice"></div>

        <div class="field-row">
            <div class="field-group">
                <label class="field-label" data-role="delay-label"></label>
                <input
                    type="number"
                    id="response-editor-delay"
                    min="0"
                    max="30000"
                    class="input-base field-input mock-server-number-input"
                />
                <span class="field-help mock-server-input-hint">(0-30000)</span>
            </div>
            <div class="field-group">
                <label class="field-label" data-role="status-code-label"></label>
                <input
                    type="number"
                    id="response-editor-status-code"
                    min="100"
                    max="599"
                    class="input-base field-input mock-server-number-input"
                />
                <span class="field-help mock-server-input-hint">(100-599)</span>
            </div>
        </div>

        <div class="field-group u-flex u-flex-col u-flex-1 u-min-h-0 u-overflow-hidden">
            <label class="field-label" data-role="body-label"></label>
            <textarea
                id="response-editor-textarea"
                class="textarea-base mock-server-response-editor-textarea"
                spellcheck="false"
            ></textarea>
            <div id="response-editor-error" class="field-error"></div>
        </div>

        <div class="mock-server-response-editor-footer dialog-footer dialog-footer--divided u-items-center u-justify-between u-gap-2">
            <button id="response-editor-reset" class="btn btn-outline" data-role="reset"></button>
            <div class="u-flex u-gap-2">
                <button id="response-editor-cancel" class="btn btn-outline" data-role="cancel"></button>
                <button id="response-editor-save" class="btn btn-primary" data-role="save"></button>
            </div>
        </div>
    </div>
</template>

<template id="tpl-mock-server-alert">
    <div>
        <p class="mock-server-alert-message" data-role="message"></p>
        <div class="u-flex u-justify-end">
            <button id="alert-ok" class="btn btn-primary" data-role="ok"></button>
        </div>
    </div>
</template>
