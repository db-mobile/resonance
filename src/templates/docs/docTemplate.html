<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - API Documentation</title>
    <style>
:root {
    --bg-color: #ffffff;
    --text-color: #1a1a1a;
    --border-color: #e5e7eb;
    --code-bg: #f3f4f6;
    --link-color: #2563eb;
    --method-get: #22c55e;
    --method-post: #3b82f6;
    --method-put: #f59e0b;
    --method-patch: #8b5cf6;
    --method-delete: #ef4444;
}

[data-theme="dark"] {
    --bg-color: #1a1a1a;
    --text-color: #f3f4f6;
    --border-color: #374151;
    --code-bg: #262626;
    --link-color: #60a5fa;
}

@media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
        --bg-color: #1a1a1a;
        --text-color: #f3f4f6;
        --border-color: #374151;
        --code-bg: #262626;
        --link-color: #60a5fa;
    }
}

* {
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.6;
    color: var(--text-color);
    background-color: var(--bg-color);
    margin: 0;
    padding: 0;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2rem;
}

header {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--border-color);
}

header h1 {
    margin: 0 0 0.5rem 0;
    font-size: 2.5rem;
}

.header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

.theme-toggle {
    background: var(--code-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 0.5rem;
    cursor: pointer;
    color: var(--text-color);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s;
}

.theme-toggle:hover {
    background: var(--border-color);
}

.theme-toggle .icon-sun {
    display: none;
}

.theme-toggle .icon-moon {
    display: block;
}

[data-theme="dark"] .theme-toggle .icon-sun {
    display: block;
}

[data-theme="dark"] .theme-toggle .icon-moon {
    display: none;
}

@media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .theme-toggle .icon-sun {
        display: block;
    }
    :root:not([data-theme="light"]) .theme-toggle .icon-moon {
        display: none;
    }
}

.description {
    color: #6b7280;
    font-size: 1.1rem;
}

.base-url code {
    background: var(--code-bg);
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.9rem;
}

.toc {
    background: var(--code-bg);
    padding: 1.5rem;
    border-radius: 8px;
    margin-bottom: 2rem;
}

.toc h2 {
    margin-top: 0;
    font-size: 1.25rem;
}

.toc ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
}

.toc ul ul {
    padding-left: 1.5rem;
}

.toc li {
    margin: 0.5rem 0;
}

.toc a {
    color: var(--link-color);
    text-decoration: none;
}

.toc a:hover {
    text-decoration: underline;
}

.method {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
    color: white;
    text-transform: uppercase;
    margin-right: 0.5rem;
}

.method-get { background: var(--method-get); }
.method-post { background: var(--method-post); }
.method-put { background: var(--method-put); }
.method-patch { background: var(--method-patch); }
.method-delete { background: var(--method-delete); }

.folder {
    margin-bottom: 2rem;
}

.folder > h2 {
    font-size: 1.75rem;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 0.5rem;
}

.endpoint {
    margin: 2rem 0;
    padding: 1.5rem;
    border: 1px solid var(--border-color);
    border-radius: 8px;
}

.endpoint h3 {
    margin-top: 0;
    display: flex;
    align-items: center;
}

.endpoint h4 {
    margin: 1.5rem 0 0.75rem 0;
    font-size: 1rem;
    color: #6b7280;
}

.schema-section {
    margin: 1rem 0;
}

.schema-section summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.schema-section summary::-webkit-details-marker {
    display: none;
}

.schema-section summary::before {
    content: "▶";
    font-size: 0.75rem;
    transition: transform 0.2s;
}

.schema-section[open] summary::before {
    transform: rotate(90deg);
}

.schema-section summary h4 {
    margin: 0;
    display: inline;
}

.endpoint-url code {
    background: var(--code-bg);
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    word-break: break-all;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.5rem 0;
    font-size: 0.9rem;
}

th, td {
    text-align: left;
    padding: 0.75rem;
    border: 1px solid var(--border-color);
}

th {
    background: var(--code-bg);
    font-weight: 600;
}

pre {
    background: var(--code-bg);
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
    margin: 0.5rem 0;
}

code {
    font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
    font-size: 0.875rem;
}

.code-tabs {
    margin-top: 0.5rem;
}

.tab-buttons {
    display: flex;
    gap: 0.25rem;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 0;
}

.tab-btn {
    padding: 0.5rem 1rem;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 0.875rem;
    color: var(--text-color);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
}

.tab-btn:hover {
    background: var(--code-bg);
}

.tab-btn.active {
    border-bottom-color: var(--link-color);
    color: var(--link-color);
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
    text-align: center;
    color: #6b7280;
    font-size: 0.875rem;
}

@media print {
    .tab-buttons { display: none; }
    .tab-content { display: block !important; }
    .tab-content::before {
        content: attr(data-lang);
        font-weight: bold;
        display: block;
        margin-bottom: 0.5rem;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-row">
                <h1>{{TITLE}}</h1>
                <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
            {{DESCRIPTION}}
            {{BASE_URL}}
        </header>

        <nav class="toc">
            <h2>Table of Contents</h2>
            {{TOC}}
        </nav>

        <main>
            {{CONTENT}}
        </main>

        <footer>
            <p>Generated by Resonance on {{DATE}}</p>
        </footer>
    </div>
    <script>
// Theme toggle
(function() {
    const toggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    
    const savedTheme = localStorage.getItem('docs-theme');
    if (savedTheme) {
        html.setAttribute('data-theme', savedTheme);
    }
    
    toggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        let newTheme;
        
        if (currentTheme === 'dark') {
            newTheme = 'light';
        } else if (currentTheme === 'light') {
            newTheme = 'dark';
        } else {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            newTheme = prefersDark ? 'light' : 'dark';
        }
        
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('docs-theme', newTheme);
    });
})();

// Code tabs
document.querySelectorAll('.code-tabs').forEach(tabs => {
    const buttons = tabs.querySelectorAll('.tab-btn');
    const contents = tabs.querySelectorAll('.tab-content');

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.dataset.lang;

            buttons.forEach(b => b.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));

            btn.classList.add('active');
            tabs.querySelector(`.tab-content[data-lang="${lang}"]`).classList.add('active');
        });
    });
});
    </script>
</body>
</html>
