<template id="tpl-code-snippet-dialog">
    <div class="u-flex u-flex-col u-flex-1 u-min-h-0 u-overflow-hidden">
        <div class="dialog-header">
            <h3 class="dialog-title">Code Snippet</h3>
            <button id="code-snippet-close-btn" class="dialog-close-btn" aria-label="Close">&times;</button>
        </div>

        <div class="field-group">
            <label for="language-selector" class="field-label">Language:</label>
            <div class="select-wrapper">
                <select id="language-selector" class="select-base" data-role="language-selector"></select>
                <span class="select-arrow icon icon-12 icon-chevron-down"></span>
            </div>
        </div>

        <div class="dialog-body code-snippet-body">
            <pre id="code-snippet-display" class="code-snippet-display"></pre>
        </div>

        <div class="dialog-footer dialog-footer--divided">
            <button id="code-snippet-copy-btn" class="btn btn-primary code-snippet-copy-btn u-flex u-items-center u-gap-2">
                <span class="icon icon-16 icon-copy"></span>
                <span>Copy to Clipboard</span>
            </button>
            <button id="code-snippet-close-bottom-btn" class="btn btn-outline">Close</button>
        </div>
    </div>
</template>

<template id="tpl-code-snippet-language-option">
    <option></option>
</template>
