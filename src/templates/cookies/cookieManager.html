<template id="tpl-cookie-manager">
    <div class="dialog-header">
        <h2 class="dialog-title">Cookie Jar</h2>
        <div class="cookie-manager-env-selector environment-selector">
            <button type="button" class="env-selector-button cookie-manager-env-button" id="cookie-manager-env-btn" aria-label="Select environment" aria-haspopup="true">
                <span class="env-active-indicator is-hidden" data-role="active-indicator"></span>
                <span class="env-icon icon icon-16 icon-globe" aria-hidden="true"></span>
                <span class="env-name" id="cookie-manager-env-name">Environment</span>
                <span class="env-arrow icon icon-12 icon-chevron-down" aria-hidden="true"></span>
            </button>
            <div class="env-dropdown dropdown-panel is-hidden" id="cookie-manager-env-dropdown"></div>
        </div>
        <button class="dialog-close-btn" id="cookie-manager-close-btn" aria-label="Close Cookie Manager">
            <span class="icon icon-20 icon-x"></span>
        </button>
    </div>

    <div class="cookie-manager-toggle-row">
        <label class="toggle-switch">
            <input type="checkbox" id="cookie-manager-enabled-toggle">
            <span class="toggle-track"></span>
            <span>Automatically store and send cookies</span>
        </label>
    </div>

    <div class="cookie-manager-search-row">
        <div class="search-input-wrap">
            <span class="search-input-icon icon icon-16 icon-search" aria-hidden="true"></span>
            <input
                type="text"
                class="input-base form-input compact search-input"
                id="cookie-manager-search"
                placeholder="Search cookies..."
                aria-label="Search cookies"
            />
        </div>
    </div>

    <div class="dialog-body cookie-manager-body">
        <table class="cookies-table cookie-manager-table">
            <thead>
                <tr>
                    <th>Domain</th>
                    <th>Name</th>
                    <th>Value</th>
                    <th>Path</th>
                    <th>Expires</th>
                    <th>Flags</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="cookie-manager-tbody">
            </tbody>
        </table>
        <div class="empty-state-base cookies-empty is-hidden" id="cookie-manager-empty">
            No cookies stored for this environment.
        </div>
    </div>

    <div class="dialog-footer dialog-footer--divided">
        <button class="btn btn-sm btn-outline" id="cookie-manager-clear-session-btn">Clear Session</button>
        <button class="btn btn-sm btn-outline" id="cookie-manager-clear-all-btn">Clear All</button>
    </div>
</template>
