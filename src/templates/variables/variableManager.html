<template id="tpl-variable-manager-dialog">
    <div class="u-flex u-flex-col u-gap-4">
        <div class="dialog-header">
            <h3 class="dialog-title" data-role="title"></h3>
            <button id="variables-close-btn" class="dialog-close-btn" aria-label="Close"><span class="icon icon-16 icon-x"></span></button>
        </div>

        <div class="variable-manager-usage">
            <p class="variable-manager-usage-text">
                <strong>Usage:</strong> Define variables here and use them in your requests with <code>{{ variableName }}</code> syntax.
                Variables can be used in URLs, headers, query parameters, and request bodies.
                Values can reference other variables, including dynamic ones like <code>{{$uuid}}</code>.
            </p>
            <button type="button" id="dynamic-vars-reference-btn" class="btn btn-xs btn-outline">Dynamic variables…</button>
        </div>

        <div class="manager-toolbar">
            <span class="manager-section-title">Variables</span>
            <div class="manager-header-actions u-flex">
                <button id="add-variable-btn" class="btn btn-sm btn-outline-primary">+ Add Variable</button>
                <button id="import-variables-btn" class="btn btn-sm btn-outline">Import</button>
                <button id="export-variables-btn" class="btn btn-sm btn-outline">Export</button>
            </div>
        </div>

        <div id="variables-container" class="manager-content"></div>

        <div class="dialog-footer dialog-footer--divided">
            <button id="variables-cancel-btn" class="btn btn-outline">Cancel</button>
            <button id="variables-save-btn" class="btn btn-primary">Save Variables</button>
        </div>
    </div>
</template>

<template id="tpl-variable-manager-row">
    <div class="variable-row">
        <input type="text" class="input-base variable-name" placeholder="Variable name">
        <div class="var-value-wrap">
            <input type="text" class="input-base variable-value" placeholder="Variable value">
            <button type="button" class="btn btn-icon variable-reveal-btn is-hidden" title="Show value" tabindex="-1">
                <span class="icon icon-14 icon-eye"></span>
            </button>
        </div>
        <button type="button" class="btn btn-icon variable-secret-btn" title="Mark as secret (kept out of collection files and exports)">
            <span class="icon icon-14 icon-lock"></span>
        </button>
        <button class="btn-delete remove-variable-btn">×</button>
    </div>
</template>

<template id="tpl-variable-manager-import-dialog">
    <div class="u-flex u-flex-col u-gap-4">
        <h4 class="dialog-title">Import Variables</h4>
        <textarea id="import-textarea" placeholder="Paste JSON object with variables..." class="textarea-base variable-import-textarea"></textarea>
        <div class="dialog-footer">
            <button id="import-cancel" class="btn btn-outline">Cancel</button>
            <button id="import-confirm" class="btn btn-primary">Import</button>
        </div>
    </div>
</template>
