<template id="tpl-settings-modal">
    <div class="modal-overlay">
        <div class="modal-dialog modal-dialog--settings u-flex u-flex-col">
            <div class="settings-header u-flex u-items-center u-justify-between">
                <h2 class="dialog-title" data-i18n="settings.title">Settings</h2>
                <button class="dialog-close-btn" aria-label="Close Settings" data-i18n-aria="settings.close">
                    <span class="icon icon-20 icon-x"></span>
                </button>
            </div>

            <div class="settings-tabs">
                <button class="settings-tab active" data-tab="general" data-i18n="settings.tab_general">General</button>
            </div>

            <div class="settings-content">
                <div class="settings-tab-content active" data-tab-content="general">
                    <div data-role="language-section"></div>

                    <div class="settings-section">
                        <h3 data-i18n="settings.theme">Theme</h3>
                        <div class="theme-select-container">
                            <select class="select-base theme-select" name="theme">
                                <option value="light" data-i18n="theme.light">Light</option>
                                <option value="dark" data-i18n="theme.dark">Dark</option>
                                <option value="system" data-i18n="theme.system">System</option>
                                <option value="black" data-i18n="theme.black">Black (OLED)</option>
                            </select>
                            <span class="select-arrow icon icon-12 icon-chevron-down"></span>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="settings.accent_color">Accent Color</h3>
                        <div class="accent-color-grid" data-role="accent-grid"></div>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="settings.http_version">HTTP Version</h3>
                        <div class="http-version-select-container">
                            <select class="select-base http-version-select" name="httpVersion">
                                <option value="auto" data-i18n="http_version.auto">Auto</option>
                                <option value="http1" data-i18n="http_version.http1">HTTP/1.x</option>
                                <option value="http2" data-i18n="http_version.http2">HTTP/2</option>
                            </select>
                            <span class="select-arrow icon icon-12 icon-chevron-down"></span>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="settings.request_timeout">Request Timeout</h3>
                        <div class="form-input-container">
                            <input type="number" class="input-base form-input" name="requestTimeout" min="0" step="1000" placeholder="0">
                            <span class="form-input-unit">ms</span>
                        </div>
                        <p class="form-input-hint" data-i18n="settings.timeout_description">Set to 0 for no timeout</p>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="settings.ssl_verification">SSL Verification</h3>
                        <label class="toggle-switch">
                            <input type="checkbox" name="verifySsl">
                            <span class="toggle-track"></span>
                            <span data-i18n="settings.ssl_verification_label">Verify SSL certificates</span>
                        </label>
                        <p class="form-input-hint" data-i18n="settings.ssl_verification_description">Disable for self-signed certificates in development environments.</p>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="settings.follow_redirects">Follow Redirects</h3>
                        <label class="toggle-switch">
                            <input type="checkbox" name="followRedirects">
                            <span class="toggle-track"></span>
                            <span data-i18n="settings.follow_redirects_label">Automatically follow HTTP redirects</span>
                        </label>
                        <p class="form-input-hint" data-i18n="settings.follow_redirects_description">Disable to inspect redirect responses without following them.</p>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="settings.history_limit">History Limit</h3>
                        <div class="form-input-container">
                            <input type="number" class="input-base form-input" name="historyLimit" min="10" max="10000" step="10" placeholder="100">
                            <span class="form-input-unit" data-i18n="settings.history_limit_unit">entries</span>
                        </div>
                        <p class="form-input-hint" data-i18n="settings.history_limit_description">Maximum number of requests stored in history</p>
                    </div>

                </div>

                <div class="settings-tab-content" data-tab-content="updates">
                    <div class="settings-section">
                        <h3 data-i18n="settings.auto_update">Automatic Updates</h3>
                        <label class="toggle-switch">
                            <input type="checkbox" name="checkUpdatesOnLaunch">
                            <span class="toggle-track"></span>
                            <span data-i18n="settings.check_updates_on_launch">Check for updates on launch</span>
                        </label>
                        <p class="form-input-hint" data-i18n="settings.check_updates_on_launch_description">Automatically check for new versions when the application starts.</p>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="settings.manual_update">Manual Update</h3>
                        <div class="settings-update-section">
                            <button type="button" class="btn btn-secondary btn-sm" id="check-for-updates-btn" data-i18n="settings.check_for_updates">Check for Updates</button>
                            <span id="update-status" class="update-status"></span>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="settings.version_info">Version Information</h3>
                        <p class="version-info-text"><span data-i18n="settings.current_version">Current version</span>: <span id="settings-current-version"></span></p>
                    </div>
                </div>
            </div>

            <div class="settings-footer"></div>
        </div>
    </div>
</template>

<template id="tpl-settings-proxy-tab">
    <button class="settings-tab" data-tab="proxy" data-i18n="settings.tab_proxy">Proxy</button>
</template>

<template id="tpl-settings-updates-tab">
    <button class="settings-tab" data-tab="updates" data-i18n="settings.tab_updates">Updates</button>
</template>

<template id="tpl-settings-proxy-content">
    <div class="settings-tab-content" data-tab-content="proxy"></div>
</template>

<template id="tpl-settings-certs-tab">
    <button class="settings-tab" data-tab="certificates" data-i18n="settings.tab_certificates">Certificates</button>
</template>

<template id="tpl-settings-certs-content">
    <div class="settings-tab-content" data-tab-content="certificates"></div>
</template>

<template id="tpl-certs-section">
    <div class="settings-section certs-settings-section">
        <h3 data-i18n="settings.certs_title">Client Certificates (mTLS)</h3>
        <p class="form-input-hint" data-i18n="settings.certs_description">Present a client certificate and/or trust a custom CA for requests to a matching host. Files are read from disk at request time; only their paths are stored.</p>

        <div class="certs-list" data-role="certs-list"></div>

        <div class="certs-empty is-hidden" data-role="certs-empty">
            <p class="form-input-hint" data-i18n="settings.certs_empty">No certificates configured.</p>
        </div>

        <div class="certs-actions">
            <button type="button" class="btn btn-secondary btn-sm" data-role="certs-add" data-i18n="settings.certs_add">Add Certificate</button>
        </div>
    </div>
</template>

<template id="tpl-cert-entry">
    <div class="cert-entry">
        <div class="cert-entry-header u-flex u-items-center u-justify-between">
            <div class="cert-field cert-field-grow">
                <label data-i18n="settings.certs_host">Host</label>
                <input type="text" class="input-base" name="certHost" placeholder="api.example.com" autocomplete="off">
            </div>
            <label class="toggle-switch cert-enabled-toggle">
                <input type="checkbox" name="certEnabled" checked>
                <span class="toggle-track"></span>
                <span data-i18n="settings.certs_enabled">Enabled</span>
            </label>
            <button type="button" class="btn btn-icon cert-remove-btn" data-role="cert-remove" aria-label="Remove" data-i18n-aria="settings.certs_remove">
                <span class="icon icon-16 icon-trash"></span>
            </button>
        </div>

        <div class="cert-file-row u-flex u-items-center" data-file="cert">
            <label data-i18n="settings.certs_cert_file">Certificate (PEM)</label>
            <input type="text" class="input-base" name="certCertPath" readonly placeholder="—">
            <button type="button" class="btn btn-secondary btn-xs" data-role="cert-pick" data-kind="cert" data-i18n="settings.certs_choose">Choose…</button>
            <button type="button" class="btn btn-icon" data-role="cert-clear" data-kind="cert" aria-label="Clear" data-i18n-aria="settings.certs_clear">
                <span class="icon icon-14 icon-x"></span>
            </button>
        </div>

        <div class="cert-file-row u-flex u-items-center" data-file="key">
            <label data-i18n="settings.certs_key_file">Private Key (PEM, unencrypted)</label>
            <input type="text" class="input-base" name="certKeyPath" readonly placeholder="—">
            <button type="button" class="btn btn-secondary btn-xs" data-role="cert-pick" data-kind="key" data-i18n="settings.certs_choose">Choose…</button>
            <button type="button" class="btn btn-icon" data-role="cert-clear" data-kind="key" aria-label="Clear" data-i18n-aria="settings.certs_clear">
                <span class="icon icon-14 icon-x"></span>
            </button>
        </div>

        <div class="cert-file-row u-flex u-items-center" data-file="ca">
            <label data-i18n="settings.certs_ca_file">CA Bundle (PEM, optional)</label>
            <input type="text" class="input-base" name="certCaPath" readonly placeholder="—">
            <button type="button" class="btn btn-secondary btn-xs" data-role="cert-pick" data-kind="ca" data-i18n="settings.certs_choose">Choose…</button>
            <button type="button" class="btn btn-icon" data-role="cert-clear" data-kind="ca" aria-label="Clear" data-i18n-aria="settings.certs_clear">
                <span class="icon icon-14 icon-x"></span>
            </button>
        </div>

        <p class="cert-entry-error form-input-hint is-hidden" data-role="cert-error"></p>
    </div>
</template>

<template id="tpl-language-section">
    <div class="settings-section">
        <h3 data-i18n="settings.language">Language</h3>
        <div class="language-select-container">
            <select class="select-base language-select" name="language"></select>
            <span class="select-arrow icon icon-12 icon-chevron-down"></span>
        </div>
    </div>
</template>

<template id="tpl-accent-button">
    <button type="button" class="accent-btn" aria-label="accent color"></button>
</template>

<template id="tpl-proxy-section">
    <div class="settings-section proxy-settings-section">
        <div class="settings-section-header u-flex">
            <label class="toggle-switch">
                <input type="checkbox" name="proxyEnabled">
                <span class="toggle-track"></span>
                <span data-i18n="settings.proxy_enabled">Enable Proxy</span>
            </label>
        </div>

        <div class="proxy-settings-content is-hidden">
            <div class="proxy-row u-flex">
                <label class="toggle-switch proxy-system-toggle">
                    <input type="checkbox" name="proxyUseSystem">
                    <span class="toggle-track"></span>
                    <span data-i18n="settings.proxy_use_system">Use System Proxy</span>
                </label>
                <p class="proxy-field-help" data-i18n="settings.proxy_use_system_help">Automatically detect and use system proxy settings</p>
            </div>

            <div class="proxy-manual-settings">
                <div class="proxy-row u-flex">
                    <div class="proxy-field proxy-field-with-arrow">
                        <label data-i18n="settings.proxy_type">Type</label>
                        <div class="select-wrapper">
                            <select name="proxyType" class="proxy-type-select">
                                <option value="http">HTTP</option>
                                <option value="https">HTTPS</option>
                                <option value="socks4">SOCKS4</option>
                                <option value="socks5">SOCKS5</option>
                            </select>
                            <span class="select-arrow icon icon-12 icon-chevron-down"></span>
                        </div>
                    </div>
                </div>

                <div class="proxy-row u-flex">
                    <div class="proxy-field proxy-field-grow">
                        <label data-i18n="settings.proxy_host">Host</label>
                        <input type="text" name="proxyHost" placeholder="proxy.example.com">
                    </div>
                    <div class="proxy-field proxy-field-port">
                        <label data-i18n="settings.proxy_port">Port</label>
                        <input type="number" name="proxyPort" min="1" max="65535">
                    </div>
                </div>

                <div class="proxy-row u-flex">
                    <label class="toggle-switch">
                        <input type="checkbox" name="proxyAuthEnabled">
                        <span class="toggle-track"></span>
                        <span data-i18n="settings.proxy_auth">Authentication</span>
                    </label>
                </div>

                <div class="proxy-auth-fields is-hidden">
                    <div class="proxy-row u-flex">
                        <div class="proxy-field proxy-field-grow">
                            <label data-i18n="settings.proxy_username">Username</label>
                            <input type="text" name="proxyUsername" autocomplete="off">
                        </div>
                    </div>
                    <div class="proxy-row u-flex">
                        <div class="proxy-field proxy-field-grow">
                            <label data-i18n="settings.proxy_password">Password</label>
                            <input type="password" name="proxyPassword" autocomplete="off">
                        </div>
                    </div>
                </div>

                <div class="proxy-row u-flex">
                    <div class="proxy-field proxy-field-grow">
                        <label data-i18n="settings.proxy_bypass">Bypass List (comma-separated)</label>
                        <input type="text" name="proxyBypass" placeholder="localhost, *.internal.com">
                        <p class="proxy-field-help">Domains to bypass proxy (supports wildcards: *.example.com)</p>
                    </div>
                </div>
            </div>

            <div class="proxy-row proxy-actions u-flex u-items-center">
                <button type="button" class="proxy-test-btn" data-i18n="settings.proxy_test">Test Connection</button>
                <span class="proxy-test-result"></span>
            </div>
        </div>
    </div>
</template>
