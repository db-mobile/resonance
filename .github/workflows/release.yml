name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

  build-linux:
    needs: [test, lint]
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './src-tauri -> target'

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build:prod

    - name: Build Tauri application
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      run: npm run build:tauri

    - name: Prepare Linux artifacts
      run: |
        mkdir -p release-artifacts
        VERSION="${GITHUB_REF#refs/tags/v}"
        cp src-tauri/target/release/bundle/appimage/*.AppImage release-artifacts/
        cp src-tauri/target/release/bundle/deb/*.deb release-artifacts/
        # Copy update artifacts (v2 format: .sig files directly)
        cp src-tauri/target/release/bundle/appimage/*.AppImage.sig release-artifacts/ 2>/dev/null || true
        for f in release-artifacts/*.AppImage; do
          [ -f "$f" ] || continue
          base=$(basename "$f" .AppImage)
          mv "$f" "release-artifacts/resonance_${VERSION}_${{ matrix.arch }}.AppImage"
          # Also rename the sig file if it exists
          if [ -f "release-artifacts/${base}.AppImage.sig" ]; then
            mv "release-artifacts/${base}.AppImage.sig" "release-artifacts/resonance_${VERSION}_${{ matrix.arch }}.AppImage.sig"
          fi
        done
        for f in release-artifacts/*.deb; do
          [ -f "$f" ] || continue
          mv "$f" "release-artifacts/resonance_${VERSION}_${{ matrix.arch }}.deb"
        done

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v6
      with:
        name: release-linux-${{ matrix.arch }}
        path: release-artifacts/*
        retention-days: 7

  build-mac:
    needs: [test, lint]
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin,x86_64-apple-darwin

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './src-tauri -> target'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build:prod

    - name: Build Tauri application (universal)
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      run: npm run build:tauri -- --target universal-apple-darwin

    - name: Prepare Mac artifacts
      run: |
        mkdir -p release-artifacts
        VERSION="${GITHUB_REF#refs/tags/v}"
        cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/
        # Copy update artifacts (tar.gz and signature)
        cp src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz release-artifacts/ 2>/dev/null || true
        cp src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig release-artifacts/ 2>/dev/null || true
        # Rename DMG
        for f in release-artifacts/*.dmg; do
          [ -f "$f" ] || continue
          mv "$f" "release-artifacts/resonance_${VERSION}_universal.dmg"
        done

    - name: Upload Mac artifacts
      uses: actions/upload-artifact@v6
      with:
        name: release-mac
        path: release-artifacts/*
        retention-days: 7

  build-windows:
    needs: [test, lint]
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './src-tauri -> target'
        key: ${{ matrix.arch }}

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build:prod

    - name: Build Tauri application
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      run: npm run build:tauri -- --target ${{ matrix.target }}

    - name: Prepare Windows artifacts
      shell: pwsh
      run: |
        $VERSION = "$env:GITHUB_REF" -replace 'refs/tags/v', ''
        New-Item -ItemType Directory -Force -Path release-artifacts
        Copy-Item src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe release-artifacts/
        # Copy update artifacts (v2 format: .sig files directly)
        Copy-Item src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig release-artifacts/ -ErrorAction SilentlyContinue

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v6
      with:
        name: release-windows-${{ matrix.arch }}
        path: release-artifacts/*
        retention-days: 7

  release:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v6
      with:
        path: artifacts

    - name: List downloaded artifacts
      run: find artifacts -type f

    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Get previous tag
      id: previous_tag
      run: |
        PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${{ github.ref_name }}$" | head -n 1)
        echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        if [ -n "${{ steps.previous_tag.outputs.PREVIOUS_TAG }}" ]; then
          CHANGELOG=$(git log ${{ steps.previous_tag.outputs.PREVIOUS_TAG }}..${{ github.ref_name }} --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGELOG=$(git log ${{ github.ref_name }} --pretty=format:"- %s (%h)" --no-merges | head -n 20)
        fi
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Generate update manifest (latest.json)
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        REPO="${{ github.repository }}"
        TAG="${{ github.ref_name }}"
        BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
        PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        NOTES="${{ steps.changelog.outputs.CHANGELOG }}"
        
        # Read signatures from .sig files if they exist
        LINUX_AMD64_SIG=""
        LINUX_ARM64_SIG=""
        WINDOWS_X64_SIG=""
        WINDOWS_ARM64_SIG=""
        MAC_SIG=""
        
        if [ -f "artifacts/release-linux-amd64/resonance_${VERSION}_amd64.AppImage.sig" ]; then
          LINUX_AMD64_SIG=$(cat "artifacts/release-linux-amd64/resonance_${VERSION}_amd64.AppImage.sig")
        fi
        if [ -f "artifacts/release-linux-arm64/resonance_${VERSION}_arm64.AppImage.sig" ]; then
          LINUX_ARM64_SIG=$(cat "artifacts/release-linux-arm64/resonance_${VERSION}_arm64.AppImage.sig")
        fi
        if [ -f "artifacts/release-windows-x64/Resonance_${VERSION}_x64-setup.exe.sig" ]; then
          WINDOWS_X64_SIG=$(cat "artifacts/release-windows-x64/Resonance_${VERSION}_x64-setup.exe.sig")
        fi
        if [ -f "artifacts/release-windows-arm64/Resonance_${VERSION}_arm64-setup.exe.sig" ]; then
          WINDOWS_ARM64_SIG=$(cat "artifacts/release-windows-arm64/Resonance_${VERSION}_arm64-setup.exe.sig")
        fi
        if [ -f "artifacts/release-mac/Resonance.app.tar.gz.sig" ]; then
          MAC_SIG=$(cat "artifacts/release-mac/Resonance.app.tar.gz.sig")
        fi
        
        # Create latest.json for Tauri updater
        cat > artifacts/latest.json << EOF
        {
          "version": "${VERSION}",
          "notes": "See release notes at https://github.com/${REPO}/releases/tag/${TAG}",
          "pub_date": "${PUB_DATE}",
          "platforms": {
            "linux-x86_64": {
              "signature": "${LINUX_AMD64_SIG}",
              "url": "${BASE_URL}/resonance_${VERSION}_amd64.AppImage"
            },
            "linux-aarch64": {
              "signature": "${LINUX_ARM64_SIG}",
              "url": "${BASE_URL}/resonance_${VERSION}_arm64.AppImage"
            },
            "windows-x86_64": {
              "signature": "${WINDOWS_X64_SIG}",
              "url": "${BASE_URL}/Resonance_${VERSION}_x64-setup.exe"
            },
            "windows-aarch64": {
              "signature": "${WINDOWS_ARM64_SIG}",
              "url": "${BASE_URL}/Resonance_${VERSION}_arm64-setup.exe"
            },
            "darwin-universal": {
              "signature": "${MAC_SIG}",
              "url": "${BASE_URL}/Resonance.app.tar.gz"
            },
            "darwin-x86_64": {
              "signature": "${MAC_SIG}",
              "url": "${BASE_URL}/Resonance.app.tar.gz"
            },
            "darwin-aarch64": {
              "signature": "${MAC_SIG}",
              "url": "${BASE_URL}/Resonance.app.tar.gz"
            }
          }
        }
        EOF

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        REPO="${{ github.repository }}"
        TAG="${{ github.ref_name }}"
        BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

        # Upload user-facing installers first
        gh release create "$TAG" \
          --title "Release $TAG" \
          --notes "## What's Changed

        ${{ steps.changelog.outputs.CHANGELOG }}

        ---

        ## Downloads

        ### Linux
        - [AppImage](${BASE_URL}/resonance_${VERSION}_amd64.AppImage)
        - [AppImage (arm64)](${BASE_URL}/resonance_${VERSION}_arm64.AppImage)
        - [Debian Package](${BASE_URL}/resonance_${VERSION}_amd64.deb)
        - [Debian Package (arm64)](${BASE_URL}/resonance_${VERSION}_arm64.deb)

        ### macOS
        - [DMG (Universal)](${BASE_URL}/resonance_${VERSION}_universal.dmg)

        ### Windows
        - [Installer (x64)](${BASE_URL}/Resonance_${VERSION}_x64-setup.exe)
        - [Installer (arm64)](${BASE_URL}/Resonance_${VERSION}_arm64-setup.exe)

        ---

        **Full Changelog**: https://github.com/${REPO}/compare/${{ steps.previous_tag.outputs.PREVIOUS_TAG }}...$TAG" \
          artifacts/release-linux-amd64/*.AppImage \
          artifacts/release-linux-amd64/*.deb \
          artifacts/release-linux-arm64/*.AppImage \
          artifacts/release-linux-arm64/*.deb \
          artifacts/release-mac/*.dmg \
          artifacts/release-windows-x64/*.exe \
          artifacts/release-windows-arm64/*.exe

        # Upload update manifest (v2 format uses the same files as installers, just needs latest.json)
        gh release upload "$TAG" artifacts/latest.json
        # Upload mac tar.gz for updater (macOS still uses tar.gz in v2)
        gh release upload "$TAG" artifacts/release-mac/*.app.tar.gz 2>/dev/null || true
